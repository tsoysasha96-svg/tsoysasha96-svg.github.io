<header class="site-header">

      <a href="/about.html">О проекте</a>

</header>

<main>
  <section class="hero">
    <h1>Заметки о программировании и технологиях</h1>
    <p>Практические статьи для разработчиков: инструменты, языки, подходы к работе — без воды.</p>
  </section>

  <section class="post-list" id="post-list">
    <p style="color:var(--text-dim)">Загрузка статей…</p>
  </section>
</main>

<footer class="site-footer">
  <div>
    <a href="/about.html">О проекте</a>
    <a href="/privacy.html">Политика конфиденциальности</a>
    <a href="/feed.xml">RSS</a>
    <a href="https://t.me/kodblog_dev" target="_blank" rel="noopener">Telegram</a>
  </div>
  <div style="margin-top:8px">© <span id="year"></span> КодБлог</div>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

fetch('posts.json')
  .then(r => r.json())
  .then(posts => {
    posts.sort((a, b) => new Date(b.date) - new Date(a.date));
    const list = document.getElementById('post-list');
    list.innerHTML = posts.map(p => `
      <a class="post-card" href="posts/${p.slug}.html">
        <div class="cover cover--card" data-slug="${p.slug}" data-category="${p.category || ''}"></div>
        <span class="badge" data-category="${p.category || ''}">${p.category || 'Статья'}</span>
        <h2>${p.title}</h2>
        <div class="post-meta">${formatDate(p.date)} · ${p.readTime} чтения</div>
        <p class="post-excerpt">${p.excerpt}</p>
      </a>
    `).join('');
    if (window.KodBlogCovers) window.KodBlogCovers.render(list);
  })
  .catch(() => {
    document.getElementById('post-list').innerHTML = '<p>Не удалось загрузить статьи.</p>';
  });

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
}
</script>
