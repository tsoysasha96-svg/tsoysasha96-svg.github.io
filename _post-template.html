<!--
  Шаблон для новой статьи. НЕ публикуется как страница сама по себе (начинается с _).
  Порядок добавления новой статьи:
  1. Скопировать этот файл в posts/<slug>.html
  2. Заменить {{TITLE}}, {{DESCRIPTION}}, {{DATE}}, {{READ_TIME}}, {{CATEGORY}}, {{SLUG}} и текст статьи
  3. Добавить запись в posts.json (в начало массива, включая поле "category")
  4. Обновить sitemap.xml (добавить новый <url>)
  5. git add, commit, push
-->
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} — КодБлог</title>
<meta name="description" content="{{DESCRIPTION}}">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="../style.css">
<script src="../covers.js" defer></script>
<script src="../related-posts.js" defer></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6965581425781569" crossorigin="anonymous"></script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{TITLE}}",
  "description": "{{DESCRIPTION}}",
  "datePublished": "{{DATE_ISO}}",
  "dateModified": "{{DATE_ISO}}",
  "inLanguage": "ru",
  "articleSection": "{{CATEGORY}}",
  "author": { "@type": "Organization", "name": "КодБлог" },
  "publisher": {
    "@type": "Organization",
    "name": "КодБлог",
    "logo": { "@type": "ImageObject", "url": "https://tsoysasha96-svg.github.io/favicon.svg" }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://tsoysasha96-svg.github.io/posts/{{SLUG}}.html"
  }
}
</script>
<link rel="alternate" type="application/rss+xml" title="КодБлог" href="/feed.xml">
<meta property="og:type" content="article">
<meta property="og:site_name" content="КодБлог">
<meta property="og:locale" content="ru_RU">
<meta property="og:title" content="{{OG_TITLE}}">
<meta property="og:description" content="{{OG_DESCRIPTION}}">
<meta property="og:url" content="https://tsoysasha96-svg.github.io/posts/{{SLUG}}.html">
<meta property="og:image" content="https://tsoysasha96-svg.github.io/og/{{SLUG}}.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="article:published_time" content="{{DATE_ISO}}">
<meta property="article:section" content="{{CATEGORY}}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{OG_TITLE}}">
<meta name="twitter:description" content="{{OG_DESCRIPTION}}">
<meta name="twitter:image" content="https://tsoysasha96-svg.github.io/og/{{SLUG}}.png">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a class="logo" href="/">КодБлог</a>
    <nav>
      <a href="/about.html">О проекте</a>
      <a href="/privacy.html">Privacy</a>
    </nav>
  </div>
</header>

<main>
  <article class="post">
    <div class="cover cover--hero" data-slug="{{SLUG}}" data-category="{{CATEGORY}}"></div>
    <span class="badge" data-category="{{CATEGORY}}">{{CATEGORY}}</span>
    <h1>{{TITLE}}</h1>
    <div class="post-meta">{{DATE}} · {{READ_TIME}} чтения</div>

    <!-- Текст статьи: минимум 700-1000 слов, реальная польза для читателя,
         структура с h2/h3, минимум один список или блок-цитата. -->

    <div class="related-posts" id="related-posts"></div>

    <a class="back-link" href="/">← Все статьи</a>
  </article>
</main>

<footer class="site-footer">
  <div>
    <a href="/about.html">О проекте</a>
    <a href="/privacy.html">Политика конфиденциальности</a>
    <a href="https://t.me/kodblog_dev" target="_blank" rel="noopener">Telegram</a>
  </div>
</footer>

<div class="love-note">Я люблю Алину Цой (Билялову)</div>

</body>
</html>
